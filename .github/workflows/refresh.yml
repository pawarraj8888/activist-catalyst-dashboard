name: Refresh Dashboard Data
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests feedparser beautifulsoup4 lxml python-dotenv yfinance pandas numpy
      - run: python scripts/pull_edgar.py
      - run: python scripts/pull_options.py
      - run: python scripts/pull_short_interest.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
